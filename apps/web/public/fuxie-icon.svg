  <!-- Right eye -->
  <ellipse cx="41" cy="34" rx="5.5" ry="6" fill="#F5A623"/>
  <ellipse cx="41" cy="34" rx="3.5" ry="4" fill="#1a1a1a"/>
  <circle cx="39.5" cy="32.5" r="1.5" fill="white"/>
