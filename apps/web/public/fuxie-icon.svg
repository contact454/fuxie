  <path d="M14 24 L11 15 L19 22 Z" fill="#D4E8F7" opacity="0.8"/>
  <path d="M50 24 L53 15 L45 22 Z" fill="#D4E8F7" opacity="0.8"/>
  <!-- White cheeks -->
  <ellipse cx="20" cy="40" rx="8" ry="7" fill="#D4E8F7"/>
