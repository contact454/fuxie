services:
  postgres:
    image: postgres:16-alpine
    container_name: fuxie-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fuxie
      POSTGRES_PASSWORD: fuxie_dev
      POSTGRES_DB: fuxie_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuxie -d fuxie_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
